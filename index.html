<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

<div class="login-container">
    <div class="login-card">

        <!-- Logo -->
        <div class="text-center mb-3">
            <img src="student portal logo.png" width="100">
        </div>

        <h1 class="text-center mb-4">Login</h1>

        <form>
            <div class="mb-3">
                <label class="form-label fw-bold">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter here">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Password</label>
                <input type="password" id="password" class="form-control" placeholder="********">
            </div>

            <div id="display" class="text-danger text-center mb-3 fw-bold"></div>

            <div class="text-center mb-3 ">
                <input type="checkbox" class="form-check-input" id="stayLogged">
                <label class="form-check-label" for="stayLogged">Stay logged in</label>
            </div>

            <div class="d-flex gap-2">
                <button type="button" id="login" onclick="LogUser()" class="btn btn-primary flex-fill">
                    Login
                </button>
                <button type="button" onclick="window.location.reload()" class="btn btn-secondary flex-fill">
                    Cancel
                </button>
            </div>
        </form>

        <div class="text-center mt-3">
            <a href="#" class="text-muted small">Forgot username / password?</a>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="main.js"></script>

</body>
</html>
